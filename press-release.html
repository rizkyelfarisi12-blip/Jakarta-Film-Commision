<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jakarta Film Commission</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

 <!-- internal resources -->
 <link rel="stylesheet" href="assets/css/custom.css">


</head>

<body>
  
  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- =========================
  PRESS RELEASE HERO
  ========================= -->

  <section class="press-release-hero">

    <!-- BG -->
    <div class="press-release-bg">
      <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1800&auto=format&fit=crop" alt="">
      <div class="press-release-overlay"></div>
    </div>

    <div class="container">

      <div class="press-release-hero-content">

        <span class="press-release-label" id="pressCategory"></span>

        <h1 id="heroPressTitle"></h1>

      </div>

    </div>

  </section>


  <!-- =========================
  press-release CONTENT
  ========================= -->

  <section class="press-release-section">

    <div class="container">
      <div class="press-meta">

        <span id="pressDate"></span>

      </div>

      <div class="press-release-wrapper">

        <!-- TITLE -->
        <div class="press-release-heading">

          <div class="press-release-line"></div>

          <h2 id="pressTitle"></h2>

        </div>
    
        <!-- CONTENT -->
        <div class="press-release-content" id="pressContent"></div>

      </div>

    </div>

  </section>
  

  <!-- FOOTER -->
  <div id="footer"></div>
 

</body>

<!-- JAVASCRIPT -->
  <script src="assets/js/components.js"></script>
<script src="assets/js/custom.js"></script>

<!-- DATA -->
<script src="assets/data/press-release-data.js"></script>

<script>

function generateSlug(title){

  return title
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-");

}

function loadPressDetail(){

  // ambil slug URL
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug");

  // cari data dari pressData.js
  const press = pressData.find(item =>
    generateSlug(item.title) === slug
  );

  // kalau tidak ketemu
  if(!press){

    document.getElementById("heroPressTitle").textContent =
      "Press Release Not Found";

    document.getElementById("pressTitle").textContent =
      "Press Release Not Found";

    return;
  }

  // HERO TITLE
  document.getElementById("heroPressTitle").textContent =
    press.title;

  // TITLE
  document.getElementById("pressTitle").textContent =
    press.title;

  // CATEGORY
  document.getElementById("pressCategory").textContent =
    press.category;

  // DATE
  document.getElementById("pressDate").textContent =
    press.date;

  // CONTENT
  const content =
    document.getElementById("pressContent");

  content.innerHTML = "";

  press.content.forEach(paragraph => {

    content.innerHTML += `
      <p>${paragraph}</p>
    `;

  });

  // browser title
  document.title =
    press.title + " | Jakarta Film Commission";

}

loadPressDetail();

</script>
</html>
