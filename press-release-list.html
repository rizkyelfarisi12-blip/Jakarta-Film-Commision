<head>

 <!-- internal resources -->
 <link rel="stylesheet" href="assets/css/custom.css">


</head>

<body>
  
  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- HERO -->
    <section class="press-release-hero">

    <div class="press-release-bg">
        <img src="assets/images/press-release-bg.jpg" alt="">
    </div>

    <div class="press-release-overlay"></div>

    <div class="container">

        <div class="press-release-hero-content">

        <span class="press-release-label">
            Communications & Press
        </span>

        <h1>
            Press Releases
        </h1>

        </div>

    </div>

    </section>

    <!-- =========================
PRESS RELEASE LIST
========================= -->
<section class="section">

  <div class="container">

    <!-- FILTER -->
    <div class="press-filter-wrapper">

      <div class="press-filters">

        <button class="press-filter active" data-filter="all">
          All Announcements
        </button>

        <button class="press-filter" data-filter="official">
          Official Release
        </button>

        <button class="press-filter" data-filter="program">
          Program Update
        </button>

        <button class="press-filter" data-filter="industry">
          Industry News
        </button>

      </div>

    <div class="press-sort-dropdown">

    <button class="press-sort-trigger" id="sortTrigger">
        Sort: Newest
        <span>+</span>
    </button>

    <div class="press-sort-menu" id="sortMenu">

        <button class="sort-option active" data-sort="newest">
        Newest
        </button>

        <button class="sort-option" data-sort="oldest">
        Oldest
        </button>

    </div>

    </div>

    </div>

    <!-- LIST -->
    <div class="press-list" id="pressContainer"></div>

    <!-- LOAD MORE -->
    <div class="film-button-wrap">
      <button class="film-button" id="loadMoreBtn">
        Load More Updates
      </button>
    </div>

  </div>

</section>

  <!-- FOOTER -->
  <div id="footer"></div>
 

</body>

<!-- JAVASCRIPT -->
  <script src="assets/js/components.js"></script>
  <script src="assets/js/custom.js"></script>
  <script src="assets/data/press-release-data.js"></script>

<script>

let visibleCount = 5;
let currentFilter = "all";
let currentSort = "newest";

function loadPressReleases(){

  renderPress();

}

function renderPress(){

  const container =
    document.getElementById("pressContainer");

  const loadBtn =
    document.getElementById("loadMoreBtn");

  container.innerHTML = "";

  let filtered = [...pressData];

  // FILTER
  if(currentFilter !== "all"){

    filtered = filtered.filter(item =>
      item.category.toLowerCase().includes(currentFilter)
    );

  }

  // SORT
  filtered.sort((a,b)=>{

    const dateA = new Date(a.date);
    const dateB = new Date(b.date);

    return currentSort === "newest"
      ? dateB - dateA
      : dateA - dateB;

  });

  // RENDER
  filtered.slice(0, visibleCount).forEach(item => {

    container.innerHTML += `

      <article class="press-item">

        <div class="press-top">

          <span class="press-category">
            ${item.category}
          </span>

          <span class="press-date">
            ${item.date}
          </span>

        </div>

        <h2>${item.title}</h2>

        <p>${item.description}</p>

        <a href="press-release.html?slug=${generateSlug(item.title)}" class="press-link">
          Read Full Announcement →
        </a>

      </article>

    `;

  });

  // HIDE LOAD MORE IF NOT NEEDED
  if(filtered.length <= visibleCount){

    loadBtn.style.display = "none";

  }else{

    loadBtn.style.display = "inline-flex";

  }

}

function generateSlug(title){

  return title
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-");

}

document
.getElementById("loadMoreBtn")
.addEventListener("click", () => {

  visibleCount += 5;

  renderPress();

});

loadPressReleases();

</script>
 
</html>
