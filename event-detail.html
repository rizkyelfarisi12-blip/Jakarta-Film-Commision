  <script>

function generateSlug(title){

  return title
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-");

}

const params =
new URLSearchParams(window.location.search);

const slug = params.get("slug");

console.log("URL SLUG:", slug);

console.log(eventData);

let currentEvent = null;

eventData.forEach(item => {

  console.log(
    generateSlug(item.title)
  );

  if(generateSlug(item.title) === slug){

    currentEvent = item;

  }

});

console.log(currentEvent);

if(!currentEvent){

  document.body.innerHTML = `
    <h1 style="padding:40px">
      Event Not Found
    </h1>
  `;

}else{

  document.getElementById("eventTitle")
  .textContent =
  currentEvent.title;

  document.getElementById("eventCategory")
  .textContent =
  currentEvent.category;

  document.getElementById("eventDate")
  .innerHTML =
  `📅 ${currentEvent.date}`;

  document.getElementById("eventLocation")
  .innerHTML =
  `📍 ${currentEvent.location}`;
  
  document.getElementById("mapsLink")
  .href =
  currentEvent.maps;

  document.getElementById("sidebarDate")
  .textContent =
  currentEvent.date;

  document.getElementById("eventTime")
  .textContent =
  currentEvent.time;

  document.getElementById("sidebarLocation")
  .textContent =
  currentEvent.location;

  document.getElementById("sidebarAddress")
  .textContent =
  currentEvent.address;

  document.querySelector(".event-detail-bg img")
  .src =
  currentEvent.image;

    const content =
    document.getElementById("eventContent");

    currentEvent.content.forEach(paragraph => {

    content.innerHTML += `
        <p>${paragraph}</p>
    `;

    });

    const scheduleList =
    document.getElementById("scheduleList");

    if(currentEvent.schedule){

    currentEvent.schedule.forEach(item => {

        scheduleList.innerHTML += `

        <div class="schedule-item">

            <div class="schedule-time">
            ${item.time}
            </div>

            <div class="schedule-content">

            <h3>
                ${item.title}
            </h3>

            <p>
                ${item.description}
            </p>

            </div>

        </div>

        `;

    });

    }

}
